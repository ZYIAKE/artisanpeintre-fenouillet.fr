<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable | VG Peintures - Peintre a Fenouillet (31)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #f9fafb;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: #1e3a5f;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e3a5f;
      margin-bottom: 1rem;
    }
    p {
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background-color: #f97316;
      color: #ffffff;
      font-weight: 700;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-size: 1rem;
      transition: background-color 0.2s;
    }
    .btn-primary:hover { background-color: #ea580c; }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background-color: #1e3a5f;
      color: #ffffff;
      font-weight: 600;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-size: 0.875rem;
      transition: background-color 0.2s;
    }
    .btn-secondary:hover { background-color: #2a4f7a; }
    .footer-links {
      margin-top: 2.5rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: #6b7280;
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: #1e3a5f; }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page introuvable</h1>
    <p>La page que vous recherchez n'existe pas ou a ete deplacee. Verifiez l'adresse ou revenez a l'accueil.</p>
    <div class="links">
      <a href="/" class="btn-primary">Retour a l'accueil</a>
      <a href="/plan-du-site" class="btn-secondary">Voir le plan du site</a>
    </div>
    <div class="footer-links">
      <a href="/services">Services</a>
      <a href="/zones-intervention">Zones</a>
      <a href="/tarifs">Tarifs</a>
      <a href="/contact">Contact</a>
    </div>
  </div>
</body>
</html>
